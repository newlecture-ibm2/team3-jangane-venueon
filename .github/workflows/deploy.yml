# ============================================================
# VenueOn CI/CD Pipeline (Self-hosted Runner)
# ============================================================
# 트리거: dev 브랜치 push
# 흐름: git pull → docker-compose build → health check
# 실패 시: 자동 rollback (git revert → 재배포)
# ============================================================

name: VenueOn Deploy

on:
  push:
    branches: [ dev ]

jobs:
  deploy:
    runs-on: self-hosted

    # ⭐ 환경변수 정의 — docker-compose가 ${변수명} 형식으로 자동 읽음
    env:
      COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME }}
      SPRING_DATASOURCE_URL: ${{ vars.SPRING_DATASOURCE_URL }}
      SPRING_DATASOURCE_USERNAME: ${{ vars.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      BACKEND_PORT: ${{ vars.BACKEND_PORT }}
      FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
      DB_PORT: ${{ vars.DB_PORT }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}

    steps:
      # 1. 최신 소스 반영
      - name: Pull latest code
        run: |
          cd ~/workspace/team3-jangane-venueon
          git pull origin dev

      # 2. Docker Compose로 빌드 & 배포
      - name: Build and Deploy
        run: |
          cd ~/workspace/team3-jangane-venueon
          docker-compose down
          docker-compose up -d --build

      # 3. Health Check (배포 정상 확인)
      - name: Health Check
        run: |
          echo "⏳ Waiting for services to start..."
          sleep 20

          echo "🔍 Checking Frontend..."
          curl -f http://localhost:${FRONTEND_PORT} || exit 1
          echo "✅ Frontend OK"

          echo "🔍 Checking Backend..."
          curl -f http://localhost:${BACKEND_PORT}/actuator/health || exit 1
          echo "✅ Backend OK"

      # 4. 불필요한 이미지 정리
      - name: Cleanup
        run: docker image prune -f

      # 5. 배포 실패 시 Rollback
      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Rolling back..."
          cd ~/workspace/team3-jangane-venueon
          docker-compose down
          git revert HEAD --no-edit
          docker-compose up -d --build
          echo "🔄 Rollback completed"
