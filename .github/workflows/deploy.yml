# ============================================================
# VenueOn CI/CD Pipeline (Self-hosted Runner)
# ============================================================
# 트리거: dev 브랜치 push
# 흐름: checkout → .env 생성 → docker compose build → health check
# 실패 시: 자동 rollback (이전 커밋으로 reset → 재배포)
# ============================================================

name: VenueOn Deploy

on:
  push:
    branches: [ dev ]

jobs:
  deploy:
    runs-on: self-hosted

    # ⭐ 환경변수 정의 — docker compose가 ${변수명} 형식으로 자동 읽음
    env:
      COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME }}
      SPRING_DATASOURCE_URL: ${{ vars.SPRING_DATASOURCE_URL }}
      SPRING_DATASOURCE_USERNAME: ${{ vars.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      BACKEND_PORT: ${{ vars.BACKEND_PORT }}
      FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
      DB_PORT: ${{ vars.DB_PORT }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}

    steps:
      # 1. ✅ 소스코드 체크아웃 (GitHub Actions 표준 방식)
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. 최신 소스를 서버 작업 디렉토리에 동기화
      - name: Sync to workspace
        run: |
          mkdir -p ~/workspace/team3-jangane-venueon
          rsync -a --delete --exclude='.git' ./ ~/workspace/team3-jangane-venueon/

      # 3. .env 파일 생성 (docker compose가 환경변수를 확실히 인식하도록)
      - name: Generate .env file
        run: |
          cd ~/workspace/team3-jangane-venueon
          cat > .env << 'ENVEOF'
          COMPOSE_PROJECT_NAME=${{ vars.COMPOSE_PROJECT_NAME }}
          SPRING_DATASOURCE_URL=${{ vars.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME=${{ vars.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          POSTGRES_DB=${{ vars.POSTGRES_DB }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          BACKEND_PORT=${{ vars.BACKEND_PORT }}
          FRONTEND_PORT=${{ vars.FRONTEND_PORT }}
          DB_PORT=${{ vars.DB_PORT }}
          NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}
          API_BASE_URL=${{ vars.API_BASE_URL }}
          ENVEOF
          # 앞쪽 공백 제거
          sed -i 's/^[[:space:]]*//' .env

      # 4. Docker Compose로 빌드 & 배포
      - name: Build and Deploy
        run: |
          cd ~/workspace/team3-jangane-venueon
          docker compose down
          docker compose up -d --build

      # 5. Health Check (배포 정상 확인)
      - name: Health Check
        run: |
          cd ~/workspace/team3-jangane-venueon
          echo "⏳ Waiting for services to start..."
          sleep 20

          echo "🔍 Checking Frontend..."
          curl -f http://localhost:${{ vars.FRONTEND_PORT }} || exit 1
          echo "✅ Frontend OK"

          echo "🔍 Checking Backend..."
          docker compose exec -T backend curl -f http://localhost:8080/actuator/health || exit 1
          echo "✅ Backend OK"

      # 6. 불필요한 이미지 정리
      - name: Cleanup
        run: docker image prune -f

      # 7. 배포 실패 시 Rollback (이전 커밋으로 안전하게 복원)
      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Rolling back..."
          cd ~/workspace/team3-jangane-venueon
          docker compose down
          git reset --hard HEAD~1
          docker compose up -d --build
          echo "🔄 Rollback completed (reverted to previous commit)"
