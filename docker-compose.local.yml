# ============================================================
# VenueOn 로컬 개발용 Docker Compose
# ============================================================
# 사용법: docker-compose -f docker-compose.local.yml up -d
# DB만 Docker로 실행, 백엔드/프론트엔드는 IDE에서 직접 실행
# ============================================================

version: '3.8'

services:
  # ─── PostgreSQL (로컬 개발용) ─────────────
  db:
    image: postgres:15-alpine
    container_name: venueon-local-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=venueon_dev
      - POSTGRES_USER=venueon
      - POSTGRES_PASSWORD=venueon1234
    volumes:
      - local-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venueon -d venueon_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  local-db-data:
    name: venueon-local-db-data
