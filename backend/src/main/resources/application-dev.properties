# ===== Dev Profile (Docker PostgreSQL) =====
spring.datasource.url=jdbc:postgresql://localhost:5432/venueon_dev
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=venueon
spring.datasource.password=venueon1234
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Load Local Environment Variables (from root .env)
spring.config.import=optional:file:../.env[.properties]

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security Keys (JWT & BFF)
jwt.secret=${JWT_SECRET:v3nu30n_local_d3v_s3cr3t_k3y_f0r_jwt_t0k3n_12345!}
bff.secret=${BFF_SECRET:v3nu30n_local_d3v_s3cr3t_k3y_12345!}

# Image Upload Path (로컬: 프로젝트 내 backend/upload, 배포: ~/dist/upload)
file.upload-dir=./upload

# Static Resource Serving
spring.web.resources.static-locations=file:./upload/, classpath:/static/

# Logging
logging.level.root=INFO
logging.level.com.venueon=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Toss Payments (Test)
toss.client-key=${TOSS_CLIENT_KEY}
toss.secret-key=${TOSS_SECRET_KEY}

# Google OAuth2
google.client-id=${GOOGLE_CLIENT_ID:}
