# ===== Dev Profile (Docker PostgreSQL) =====
spring.datasource.url=jdbc:postgresql://localhost:5432/venueon_dev
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=venueon
spring.datasource.password=venueon1234
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security Keys (JWT & BFF)
jwt.secret=${JWT_SECRET:local-dev-jwt-secret-minimum-32-chars!}
bff.secret=${BFF_SECRET:local-dev-bff-secret-minimum-32-chars!}

# Image Upload Path (로컬: 프로젝트 내 backend/upload, 배포: ~/dist/upload)
file.upload-dir=./upload

# Static Resource Serving
spring.web.resources.static-locations=file:./upload/, classpath:/static/

# Logging
logging.level.root=INFO
logging.level.com.venueon=DEBUG
logging.level.org.hibernate.SQL=DEBUG

