# ===== H2 In-Memory Database (Docker 없이 로컬 개발용) =====
spring.datasource.url=jdbc:h2:mem:venueon_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (브라우저에서 http://localhost:8080/h2-console 접속)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=dev-secret-key-for-local-development-only-minimum-32-characters

# Image Upload Path
file.upload-dir=~/dist/upload

# Static Resource Serving
spring.web.resources.static-locations=file:~/dist/upload/, classpath:/static/

# Logging
logging.level.root=INFO
logging.level.com.venueon=DEBUG
logging.level.org.hibernate.SQL=DEBUG
